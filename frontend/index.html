// DOCUMENTS PAGE
// ═══════════════════════════════════════════════════════════════
function Documents({setPage, setInitialDocType}) {
  const toast = useToast();
  const [docs, setDocs] = useState([]);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    apiCall("GET","/api/documents").then(d=>setDocs(d.documents||[])).catch(()=>{}).finally(()=>setLoading(false));
  },[]);

  const DEMO_DOCS = [];  // No fake data — show empty state if backend has none
  const allDocs = docs.length ? docs : DEMO_DOCS;
  const filtered = allDocs.filter(d=>{
    const matchFilter = filter==="all"||d.status===filter;
    const matchSearch = !search||d.title.toLowerCase().includes(search.toLowerCase());
    return matchFilter && matchSearch;
  });

  const typeColor = (type) => {
    const m={rental:"doc-type-prop",employment:"doc-type-emp",internship:"doc-type-emp",freelance:"doc-type-emp",legalnotice:"doc-type-legal",affidavit:"doc-type-legal",poa:"doc-type-legal"};
    return m[type]||"doc-type-biz";
  };

  const deleteDoc = async (id) => {
    if (!confirm("Delete this document?")) return;
    try { await apiCall("DELETE",`/api/documents/${id}`); setDocs(d=>d.filter(x=>x.id!==id)); toast("🗑️ Deleted","info"); }
    catch(e){ toast("Delete failed","error"); }
  };

  return (
    <div className="page fade-in">
      <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:18}}>
        <SearchBar placeholder="Search documents…" onChange={setSearch} />
        {["all","done","draft","review"].map(f=>(
          <div key={f} className={`badge${filter===f?" badge-gold":" badge-blue"}`} style={{cursor:"pointer",padding:"4px 12px",borderRadius:20,fontSize:12}} onClick={()=>setFilter(f)}>
            {f==="all"?`All (${allDocs.length})`:f.charAt(0).toUpperCase()+f.slice(1)}
          </div>
        ))}
        <button className="btn btn-gold btn-sm" style={{marginLeft:"auto"}} onClick={()=>setPage("generator")}>
          <Icon name="plus" size={13}/> New Document
        </button>
      </div>

      {loading ? (
        <div style={{display:"flex",justifyContent:"center",padding:40}}><div className="spinner spinner-lg"/></div>
      ) : filtered.length===0 ? (
        <EmptyState icon="📭" title="No documents found" desc="Generate your first legal document" action={<button className="btn btn-gold" onClick={()=>setPage("generator")}><Icon name="plus" size={13}/>New Document</button>} />
      ) : (
        <div className="docs-grid">
          {filtered.map(d=>(
            <div key={d.id} className="doc-card">
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:8}}>
                <span className={`doc-type-badge ${typeColor(d.doc_type)}`}>{d.doc_type.toUpperCase().slice(0,8)}</span>
                <span style={{color:"var(--text3)",cursor:"pointer",fontSize:16}} onClick={()=>toast("Options: Edit, Duplicate, Archive")}>⋯</span>
              </div>
              <div className="doc-name">{d.title}</div>
              <div className="doc-meta">{d.created_at?.slice(0,10)} · {d.state} · {d.pages||"?"} pages</div>
              <div className="doc-actions">
                <button className="btn btn-ghost btn-xs" onClick={()=>{ window.open(`${API}/api/export/pdf/${d.id}`,"_blank"); toast("📄 PDF downloading…"); }}>PDF</button>
                <button className="btn btn-ghost btn-xs" onClick={()=>{ window.open(`${API}/api/export/docx/${d.id}`,"_blank"); toast("📝 DOCX downloading…"); }}>DOCX</button>
                <button className="btn btn-ghost btn-xs" onClick={()=>setPage("generator")}>Edit</button>
                <button className="btn btn-danger btn-xs" onClick={()=>deleteDoc(d.id)}><Icon name="trash" size={11}/></button>
                <span className={`status-pill pill-${d.status} `} style={{marginLeft:"auto",fontSize:"10px"}}>
                  <span className="status-dot"/>{d.status?.charAt(0).toUpperCase()+d.status?.slice(1)}
                </span>
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="card" style={{marginTop:18,padding:"13px 18px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontSize:13,color:"var(--text2)"}}>Storage Used</span>
          <span style={{fontSize:12,color:"var(--text3)"}}>6.1 MB of 100 MB</span>
        </div>
        <div className="progress-bar"><div className="progress-fill" style={{width:"6%",background:"var(--green)"}}/></div>
        <div style={{fontSize:11.5,color:"var(--text3)",marginTop:5}}>94 MB remaining on Pro plan</div>
      </div>
    </div>
  );
}

// STAMP DUTY MODAL
// ═══════════════════════════════════════════════════════════════
function StampDutyModal({onClose}) {
  const toast = useToast();
  const [state, setState] = useState("Karnataka");
  const [docType, setDocType] = useState("Sale Deed");
  const [value, setValue] = useState("");
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);

  const calc = async () => {
    if (!value) return;
    setLoading(true);
    try {
      const data = await apiCall("GET",`/api/stamp-duty?state=${encodeURIComponent(state)}&doc_type=${encodeURIComponent(docType)}&value=${value}`);
      setResult(data);
    } catch(e) {
      // fallback
      const rate={Karnataka:{["Sale Deed"]:0.056,["Rental Agreement"]:0.001},Maharashtra:{["Sale Deed"]:0.06},Delhi:{["Sale Deed"]:0.06}}[state]?.[docType]||0.05;
      const v=parseFloat(value);
      setResult({stamp_duty:Math.round(v*rate),registration_fee:Math.min(Math.round(v*0.01),30000),total:Math.round(v*rate)+Math.min(Math.round(v*0.01),30000),rate_percent:(rate*100).toFixed(1)});
    } finally { setLoading(false); }
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{width:460}}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-title">🏛️ Stamp Duty Calculator</div>
        <div style={{fontSize:12,color:"var(--text3)",marginBottom:16}}>Estimate stamp duty and registration fees for Indian documents</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div className="field"><label>State</label>
            <select value={state} onChange={e=>setState(e.target.value)}>{["Karnataka","Maharashtra","Delhi","Tamil Nadu","Telangana"].map(s=><option key={s}>{s}</option>)}</select>
          </div>
          <div className="field"><label>Document Type</label>
            <select value={docType} onChange={e=>setDocType(e.target.value)}>{["Sale Deed","Rental Agreement","Gift Deed","Power of Attorney","Partnership Deed"].map(t=><option key={t}>{t}</option>)}</select>
          </div>
          <div className="field"><label>Property / Transaction Value (₹)</label>
            <input type="number" value={value} onChange={e=>setValue(e.target.value)} placeholder="E.g. 5000000"/>
          </div>
          <button className="btn btn-gold" style={{justifyContent:"center",padding:"9px"}} onClick={calc} disabled={loading}>
            {loading?<span className="spinner"/>:"Calculate Stamp Duty"}
          </button>
        </div>
        {result && (
          <div>
            <div className="stamp-result-grid">
              <div className="stamp-item"><div className="stamp-lbl">Stamp Duty</div><div className="stamp-val">₹{result.stamp_duty?.toLocaleString("en-IN")}</div><div style={{fontSize:10,color:"var(--text3)"}}>@ {result.rate_percent}%</div></div>
              <div className="stamp-item"><div className="stamp-lbl">Registration Fee</div><div className="stamp-val blue">₹{result.registration_fee?.toLocaleString("en-IN")}</div><div style={{fontSize:10,color:"var(--text3)"}}>@ 1% (max ₹30k)</div></div>
              <div className="stamp-item featured"><div className="stamp-lbl">Total Payable</div><div className="stamp-val">₹{result.total?.toLocaleString("en-IN")}</div><div style={{fontSize:10,color:"var(--text3)"}}>Approx. estimate</div></div>
            </div>
            <div style={{marginTop:10,fontSize:11.5,color:"var(--text3)",background:"var(--bg3)",padding:"10px 12px",borderRadius:"var(--radius-sm)"}}>⚠️ Indicative estimate only. Actual stamp duty may vary based on circle rate, property type, and state government notifications.</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const [page, setPage] = useState("dashboard");
  const [showAuth, setShowAuth] = useState(false);
  const [showStamp, setShowStamp] = useState(false);
  const [initialDocType, setInitialDocType] = useState("nda");

  // Keyboard shortcuts
  useEffect(()=>{
    const handler = (e) => {
      if (e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA") return;
      if ((e.ctrlKey||e.metaKey)&&e.key==="g"){e.preventDefault();setPage("generator");}
      if ((e.ctrlKey||e.metaKey)&&e.key==="d"){e.preventDefault();setPage("dashboard");}
      if ((e.ctrlKey||e.metaKey)&&e.key==="t"){e.preventDefault();setPage("templates");}
      if ((e.ctrlKey||e.metaKey)&&e.key==="/"){e.preventDefault();setPage("chat");}
    };
    document.addEventListener("keydown",handler);
    return ()=>document.removeEventListener("keydown",handler);
  },[]);

  const renderPage = () => {
    switch(page) {
      case "dashboard": return <Dashboard setPage={setPage} setInitialDocType={setInitialDocType}/>;
      case "generator": return <Generator initialDocType={initialDocType} setPage={setPage}/>;
      case "templates": return <Templates setPage={setPage} setInitialDocType={setInitialDocType}/>;
      case "chat": return <Chat/>;
      case "knowledgebase": return <KnowledgeBase/>;
      case "documents": return <Documents setPage={setPage} setInitialDocType={setInitialDocType}/>;
      case "admin": return <Admin/>;
      case "profile": return <Profile setPage={setPage}/>;
      case "pricing": return <Pricing/>;
      case "settings": return <Settings/>;
      default: return <Dashboard setPage={setPage} setInitialDocType={setInitialDocType}/>;
    }
  };

  return (
    <AuthProvider>
      <ToastProvider>
        <div className="app">
          <Sidebar page={page} setPage={(p)=>{setPage(p);}} onAuthClick={()=>setShowAuth(true)}/>
          <div className="main-area">
            <Topbar page={page} setPage={setPage} onAuthClick={()=>setShowAuth(true)}/>
            {renderPage()}
          </div>
        </div>
        {showAuth && <AuthModal onClose={()=>setShowAuth(false)}/>}
        {showStamp && <StampDutyModal onClose={()=>setShowStamp(false)}/>}
      </ToastProvider>
    </AuthProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
